name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # 用于 npm provenance（来源证明）
    
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@b7a1c7ccf290d58743029c4f6903da283811b979 # v2.1.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f  # v6.1.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # setup-node 会自动检测 id-token 权限并生成 .npmrc 配置

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish (dry run)
        if: inputs.dry_run
        run: npm publish --access public --dry-run

      # 正式发布：使用 npm provenance（来源证明）
      # 注意：bun publish v1.3.14 存在无法正确读取 .npmrc auth token 的 bug，
      # 因此这里使用 npm publish 而非 bun publish
      - name: Publish
        if: inputs.dry_run != true
        run: npm publish --access public --provenance

      - name: Summary
        run: |
          echo "## 📦 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "🔍 **Dry run completed** - package was not actually published" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Published:** @lanrenbang/chat-adapter-ilink@$(node -p 'require("./package.json").version')" >> $GITHUB_STEP_SUMMARY
          fi
